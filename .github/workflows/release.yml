# Build and publish doze's engine binaries. Each engine is built and published
# independently (per-engine reusable workflow → per-engine rolling release), so a
# slow or failing engine never blocks the others. doze consumes each engine from
# its own release base:
#   DOZE_<ENGINE>_MIRROR=https://github.com/doze-dev/doze-binaries/releases/download/<engine>
name: release

on:
  workflow_dispatch:
    inputs:
      rebuild:
        description: >-
          Recreate already-published artifacts (normally skipped). Comma-separated:
          "16.14.0" rebuilds every triple of that version, "16.14.0:aarch64-apple-darwin"
          just one. Applies to whichever engine(s) own those versions.
        required: false
        default: ""
  push:
    branches: [main]
    paths: [versions.yaml, recipes/**, scripts/**, cmd/**, .github/workflows/**]

permissions:
  contents: write

jobs:
  # Derive the engine list from versions.yaml so adding an engine there (plus a
  # recipe) is all it takes — no hardcoded matrix to keep in sync.
  engines:
    runs-on: ubuntu-latest
    outputs:
      list: ${{ steps.list.outputs.list }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - id: list
        run: echo "list=$(go run ./cmd/dzb engines)" >> "$GITHUB_OUTPUT"

  engine:
    needs: engines
    strategy:
      fail-fast: false
      matrix:
        engine: ${{ fromJSON(needs.engines.outputs.list) }}
    uses: ./.github/workflows/build-engine.yml
    with:
      engine: ${{ matrix.engine }}
      rebuild: ${{ inputs.rebuild }}
